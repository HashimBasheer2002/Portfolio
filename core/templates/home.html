{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <h1>My Portfolio</h1>

    {% for project in projects %}
    <div class="card">

        {% if project.image %}
            <img src="{{ project.image.url }}" alt="{{ project.title }}">
        {% endif %}

        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>

    </div>
    {% endfor %}

</body>
</html>
